<!DOCTYPE html>
<html lang = "en">
<head>
    <title>Simple Table Demo</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Quý</th>
            <th>Tháng</th>
            <th>Doanh thu</th>
        </tr>
        <tr>
            <td rowspan="3">Một</td>
            <td>Một</td>
            <td>$40</td>
        </tr>
        <tr>
            <td>Hai</td>
            <td>$50</td>
        </tr>
        <tr>
            <td>Ba</td>
            <td>$80</td>
        </tr>
        <tr>
            <td colspan="3">Tổng: $170</td>
        </tr>
    </table>
    <hr>
    <p title="I'm a tooltip">
        This is a paragraph.
    </p>
    <a href="https://google.com" target="_blank">Link Google</a>
</body>
</html>
